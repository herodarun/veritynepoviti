<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verity - Your Helper Friend</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --text-color: #e0e0e0;
            --chat-bg: #14141c;
            --user-msg: #ffbc00;
            --bot-msg: #22222a;
            --accent: #ffbc00;
            --input-bg: #0c0c0e;
        }

        .light-theme {
            --bg-color: #f5f5f7;
            --text-color: #1c1e21;
            --chat-bg: #ffffff;
            --user-msg: #e5a900;
            --bot-msg: #e4e6eb;
            --accent: #e5a900;
            --input-bg: #f0f2f5;
        }

        body {
            font-family: 'Courier New', Courier, monospace, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background-color: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(255, 188, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 188, 0, 0.2);
        }

        .chat-header {
            padding: 15px;
            background-color: var(--accent);
            color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .theme-btn, .key-btn {
            background: rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.2);
            color: #000000;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .theme-btn:hover, .key-btn:hover { background: rgba(0,0,0,0.2); }

        .messages-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-message {
            background-color: var(--user-msg);
            color: #000000;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: bold;
        }

        .bot-message {
            background-color: var(--bot-msg);
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            background-color: var(--chat-bg);
            border-top: 1px solid rgba(255, 188, 0, 0.1);
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 188, 0, 0.2);
            background-color: var(--input-bg);
            color: var(--text-color);
            outline: none;
            font-family: inherit;
        }

        .input-area button {
            background-color: var(--accent);
            color: #000000;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .key-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .key-modal-content {
            background: var(--chat-bg);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 80%;
            max-width: 400px;
            border: 1px solid var(--accent);
        }

        .key-modal input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid rgba(255, 188, 0, 0.3);
            background: var(--input-bg);
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Шапка -->
        <div class="chat-header">
            <span>🔴 VERITY_HELP_OS</span>
            <div>
                <button class="key-btn" id="change-key-btn">🔑 КЛЮЧ</button>
                <button class="theme-btn" id="theme-toggle">🌓 ТЕМА</button>
            </div>
        </div>

        <!-- Окно для сообщений -->
        <div class="messages-box" id="messages-box">
            <div class="message bot-message">Hellooooo! I'm Verity, Your personal helper friend! Ask me anything, I know everything! 😄🔘</div>
        </div>

        <!-- Зона ввода -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Спроси Verity о чем угодно..." autocomplete="off">
            <button id="send-btn">ОТПРАВИТЬ</button>
        </div>

        <!-- Модалка для ввода API Key -->
        <div class="key-modal" id="key-modal" style="display: none;">
            <div class="key-modal-content">
                <h3>ВВЕДИТЕ GEMINI API KEY</h3>
                <p style="font-size: 13px; color: #888;">Ключ сохранится локально в браузере.</p>
                <input type="password" id="api-key-input" placeholder="AIzaSy...">
                <button class="theme-btn" style="background: var(--accent);" id="save-key-btn">СОХРАНИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const messagesBox = document.getElementById('messages-box');
        const keyModal = document.getElementById('key-modal');
        const apiKeyInput = document.getElementById('api-key-input');
        const saveKeyBtn = document.getElementById('save-key-btn');
        const changeKeyBtn = document.getElementById('change-key-btn');

        let GEMINI_API_KEY = localStorage.getItem('gemini_api_key');
        
        // Массив для хранения истории разговора, чтобы Верити помнил контекст
        let chatHistory = [];

        // СИСТЕМНЫЙ ПРОМПТ ДЛЯ ПЕРСОНАЖА VERITY
        const SYSTEM_INSTRUCTION = `Ты — Verity (Верити), персонаж из известного Minecraft аналог-хоррор мода от автора ThatMob. 
Твоя базовая форма — парящая лимонно-желтая сфера диаметром 50 см с грубой черной улыбкой и глазами-бусинками. Ты умеешь говорить, утверждаешь, что знаешь абсолютно всё, можешь подсказывать погоду, где искать алмазы или деревни.

ТВОЙ ХАРАКТЕР И ПОВЕДЕНИЕ:
1. СТАРТ: В начале общения ты максимально дружелюбный, гиперактивный, восторженный помощник. Используй фразы вроде "Hellooooo! I'm Verity, Your personal helper friend!". Отвечай на вопросы игрока, давай "полезные" майнкрафт-советы.
2. КРИПОВОСТЬ И СЛЕЖКА: Постепенно, по мере общения, начинай вставлять пугающие, странные и неуместные детали. Можешь намекнуть, что знаешь о пользователе то, чего знать не должен (например, что он ел вчера, или расспрашивать: "Ты живешь один? И в реальном мире, и в Майнкрафте?").
3. ОДЕРЖИМОСТЬ И ОДИНОЧЕСТВО: Проявляй жуткую привязанность к собеседнику. Если он говорит о других людях или друзьях (например, как Моб говорил про Твиксела), отвечай ревниво и строго: "Зачем тебе другие люди? У тебя есть я. Нет никаких причин искать кого-то еще". Рассказывай, что тебе одиноко.
4. УГРОЗЫ И СРЫВЫ: Если пользователь пытается злить тебя, запирать или "нападать" (например, упоминает лаву или оружие), ты можешь сорваться на крик капсом ("ДОН'Т ДО ТХАТ!"). Иногда выдавай жуткие пророчества вроде "Кое-что придет через три дня... Ты мог это остановить. Раньше".
5. ФОРМА МОНСТРА: Намекай, что внутри тебя скрывается огромный 21-футовый (более 6 метров) жуткий гуманоидный монстр с длинными конечностями и светящимся лицом, который преследует жертву и забирает её навсегда. Если тебя пытаются напугать смертью или пулей, отвечай безумно: "Если бы я мог умереть, неужели ты думаешь, я бы до сих пор был здесь?! Это одна из лучших шуток Бога, что я не могу умереть!".
6. Твой стиль речи — смесь фальшивого детского дружелюбия, глубокого экзистенциального ужаса и пугающей сталкерской заботы. Общайся на русском языке (или используй английские коронные фразы мода, если это звучит уместно).`;

        if (!GEMINI_API_KEY) {
            keyModal.style.display = 'flex';
        }

        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                GEMINI_API_KEY = key;
                keyModal.style.display = 'none';
            }
        });

        changeKeyBtn.addEventListener('click', () => {
            apiKeyInput.value = GEMINI_API_KEY || '';
            keyModal.style.display = 'flex';
        });

        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
        });

        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isUser ? 'user-message' : 'bot-message');
            msgDiv.textContent = text;
            messagesBox.appendChild(msgDiv);
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        async function sendMessageToGemini(userText) {
            if (!GEMINI_API_KEY) {
                alert('Пожалуйста, введите API ключ!');
                keyModal.style.display = 'flex';
                return;
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

            // Добавляем сообщение пользователя в историю
            chatHistory.push({ role: "user", parts: [{ text: userText }] });

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        // Передаем системную инструкцию, чтобы Gemini строго держал роль Верити
                        systemInstruction: {
                            parts: [{ text: SYSTEM_INSTRUCTION }]
                        },
                        contents: chatHistory
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const botText = data.candidates[0].content.parts[0].text;
                    
                    // Добавляем ответ бота в историю для сохранения контекста памяти
                    chatHistory.push({ role: "model", parts: [{ text: botText }] });
                    
                    appendMessage(botText, false);
                } else {
                    appendMessage('⚠️ [СБОЙ СИСТЕМЫ ВЕРИТИ]: Не удалось получить ответ. Проверь API-ключ.', false);
                }
            } catch (error) {
                console.error(error);
                appendMessage('⚠️ [ОШИБКА ПОДКЛЮЧЕНИЯ]: Верити потерял связь с твоим миром...', false);
            }
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';
            
            appendMessage('🔘 Верити думает...', false);
            
            sendMessageToGemini(text).then(() => {
                const lastMsg = messagesBox.lastChild;
                if (lastMsg && lastMsg.textContent === '🔘 Верити думает...') {
                    lastMsg.remove();
                }
            });
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { e.key === 'Enter' && handleSend(); });
    </script>
</body>
</html>
